services:
  backend:
    build: ./backend
    container_name: cs2-manager-api
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Option A (La plus propre) : On monte juste les fichiers nécessaires
      - ./backend/database.sqlite:/app/database.sqlite
      - ./backend/.env:/app/.env
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env